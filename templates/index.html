<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F4Leads — AtmonFX Lead Engine</title>
    <meta name="description" content="Lead generation engine for AtmonFX CGI & VFX Studio">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">F4<span class="accent">Leads</span></span>
            </div>
            <span class="brand-sub">AtmonFX Lead Engine</span>
        </div>

        <div class="sidebar-nav">
            <a href="#" class="nav-item active" data-view="dashboard" id="nav-dashboard">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-view="leads" id="nav-leads">
                <span class="nav-icon">🎯</span>
                <span class="nav-label">Leads</span>
            </a>
            <a href="#" class="nav-item" data-view="pipeline" id="nav-pipeline">
                <span class="nav-icon">🔄</span>
                <span class="nav-label">Pipeline</span>
            </a>
            <a href="#" class="nav-item" data-view="outreach" id="nav-outreach">
                <span class="nav-icon">✉️</span>
                <span class="nav-label">Outreach</span>
            </a>
            <a href="#" class="nav-item" data-view="generate" id="nav-generate">
                <span class="nav-icon">🚀</span>
                <span class="nav-label">Generate</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="sidebar-status" id="generation-indicator" style="display:none;">
                <div class="status-pulse"></div>
                <span class="status-text">Generating...</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-left">
                <h1 class="page-title" id="page-title">Dashboard</h1>
            </div>
            <div class="header-right">
                <div class="header-search">
                    <input type="text" id="global-search" placeholder="Search leads..." class="search-input">
                </div>
                <button class="btn btn-primary" id="btn-quick-generate" onclick="showGenerateView()">
                    <span>⚡</span> Generate Leads
                </button>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content" id="content-area">
            <!-- Dynamic content injected by JS -->
        </div>
    </main>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal-content">
            <!-- Dynamic modal content -->
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
